<div class="terminal-container" [class.light-theme]="isLightTheme">

<header class="terminal-header">
   <div class="logo">FocusRoom</div>
   <button class="theme-toggle-btn" (click)="toggleTheme()">
   🌓 SWITCH THEME
   </button>
</header>

<main class="terminal-core">
   
   <section class="station-selector">
      @for(track of tracks; track track.id){
      <button 
      class="station-btn"
      [class.active]="isTrackActive(track.id)"
      (click)="onSelectTrack(track.id)">
      {{ track.name }}
   </button>}
   </section>

   <section class="control-deck">
   <div class="visualizer-placeholder">
      <div class="mock-wave"></div>
   </div>

   <button 
      class="main-play-btn" 
      (click)="onTogglePlay()"
      [disabled]="!audioEngine.currentTrackId()">
      <span class="icon">{{ audioEngine.isPlaying() ? '⏸' : '▶' }}</span>
      <span class="label">{{ audioEngine.isPlaying() ? 'PAUSE' : 'START' }}</span>
   </button>
   </section>

   <section class="mixer-console">
   <h3 class="mixer-title">BACKGROUND SOUNDS</h3>
   
   <div class="sliders-grid">
      <div class="mixer-channel" *ngFor="let channel of noiseChannels()">
         <label>{{ channel.icon }} {{ channel.name }}</label>
         <input 
         type="range" 
         min="0" 
         max="1" 
         step="0.05" 
         [value]="channel.volume"
         (input)="onVolumeChange(channel.id, $event)">
      </div>
   </div>
   </section>

</main>

<footer class="terminal-footer">
   <p>
   <span>BPM {{ currentBpm }}</span>
   · 
   <span>STATUS: {{ audioEngine.isPlaying() ? 'FOCUSING' : 'IDLE' }}</span>
   </p>
</footer>

</div>
