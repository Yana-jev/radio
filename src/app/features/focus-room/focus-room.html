<div class="app-space" [class.light-theme]="isLightTheme">

<header class="app-header">
<div class="brand-logo">
  focus<span class="divider" [class.pulse-line]="audioEngine.isPlaying()">|</span> room
</div>
    
    <button class="glass-theme-btn" (click)="toggleTheme()">
      {{ isLightTheme ? '🌙 Deep Light' : '☀️ Soft Light' }}
    </button>
</header>

<main class="blur-card">
    
<nav class="track-pill-selector">
  @for (track of tracks; track track.id) {
    <button 
        class="pill-btn"
        [class.active]="isTrackActive(track.id)"
        (click)="onSelectTrack(track.id)">
        {{ track.name }}
    </button>
  }
</nav>

<section class="visualizer-zone">
    <button 
      class="atomic-sphere-btn" 
      [class.active]="audioEngine.isPlaying()"
      (click)="onTogglePlay()"
      [disabled]="!audioEngine.currentTrackId()">
      
      <canvas #particlesCanvas></canvas>
    </button>
<div class="track-status-text">
    {{ audioEngine.isPlaying() ? 'Focusing...' : 'Click the particles to focus' }}
  </div>
</section>

<section class="master-volume-zone">
  <div class="ambient-row">
    <div class="ambient-info">
      <span class="ambient-icon">🎵</span>
      <span class="ambient-name">Music Volume</span>
    </div>
    <div class="slider-wrapper">
      <input 
        type="range" 
        min="0" 
        max="1" 
        step="0.05" 
        [value]="audioEngine.musicVolume()"
        (input)="onMusicVolumeChange($event)">
    </div>
  </div>
</section>

<section class="ambient-mixer">
  <h3 class="mixer-headline">Ambient Environment</h3>

  <div class="ambient-stack">
    @for (channel of noiseChannels(); track channel.id) {
        <div class="ambient-row">
          <div class="ambient-info">
            <span class="ambient-icon">{{ channel.icon }}</span>
            <span class="ambient-name">{{ channel.name }}</span>
          </div>
          <div class="slider-wrapper">
            <input 
              type="range" 
              min="0" 
              max="1" 
              step="0.05" 
              [value]="channel.volume"
              (input)="onVolumeChange(channel.id, $event)">
          </div>
        </div>
    }
  </div>
</section>

</main>

</div>
